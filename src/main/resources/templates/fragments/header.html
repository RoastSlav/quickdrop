<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
<!--
  Fragment parameters:
    isAdminNav (boolean) – when true shows admin title suffix and admin-specific links
                           (Dashboard + Settings); when false shows the regular public nav.
-->
<nav class="bg-gray-800 dark:bg-gray-900 text-gray-100" th:fragment="header(isAdminNav)">
    <div class="max-w-7xl mx-auto px-4 py-4 relative">
        <div class="flex items-center justify-between">
            <div class="flex items-center space-x-2">
                <a class="flex items-center space-x-2" href="/">
                    <img
                            alt="Website Logo"
                            class="h-10"
                            src="/images/favicon.png"
                            th:src="${appLogoPath}"
                    />
                    <span class="font-semibold tracking-tight"
                          th:text="${isAdminNav} ? (${appName} + ' Admin') : ${appName}">QuickDrop</span>
                </a>
                <a
                        class="text-xs text-gray-400 dark:text-gray-500 hover:text-white"
                        href="https://github.com/roastslav/quickdrop"
                        rel="noopener noreferrer"
                        target="_blank"
                        th:if="${!#strings.equalsIgnoreCase(#strings.trim(appName), 'QuickDrop')}"
                >
                    <span th:text="#{nav.poweredBy}">Powered by QuickDrop</span>
                </a>
            </div>
            <button
                    aria-controls="navMenu"
                    aria-expanded="false"
                    class="md:hidden rounded-lg p-2 hover:bg-sky-600 dark:hover:bg-sky-500 focus:outline-none focus:ring-2 focus:ring-sky-500"
                    id="navToggle"
                    th:aria-label="#{nav.toggleNavigation}"
                    type="button"
            >
                <svg
                        aria-hidden="true"
                        class="h-6 w-6"
                        fill="none"
                        stroke="currentColor"
                        stroke-linecap="round"
                        stroke-linejoin="round"
                        stroke-width="2"
                        viewBox="0 0 24 24"
                >
                    <path d="M4 6h16M4 12h16M4 18h16"></path>
                </svg>
            </button>
            <div
                    class="nav-menu-panel hidden md:flex flex-col md:flex-row md:items-center md:space-x-4 w-full md:w-auto mt-3 md:mt-0 space-y-2 md:space-y-0 bg-gray-800 dark:bg-gray-900 md:bg-transparent md:dark:bg-transparent rounded-lg md:rounded-none p-4 md:p-0 shadow md:shadow-none absolute left-0 right-0 top-full md:static z-20 md:ml-auto"
                    id="navMenu"
            >
                <!-- Admin nav links -->
                <div th:if="${isAdminNav}"
                     class="flex flex-col space-y-2 md:flex-row md:items-center md:space-x-4 md:space-y-0">
                    <a class="nav-menu-item hover:text-white" href="/file/list" th:text="#{nav.viewFiles}">View Files</a>
                    <a class="nav-menu-item hover:text-white" href="/file/upload" th:text="#{nav.uploadFile}">Upload File</a>
                    <a class="nav-menu-item hover:text-white" href="/admin/dashboard" th:text="#{nav.dashboard}">Dashboard</a>
                    <a class="nav-menu-item hover:text-white" href="/admin/settings" th:text="#{nav.settings}">Settings</a>
                    <form th:if="${hasAdminSession or hasAppSession}" action="/admin/logout" method="post">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                        <button class="nav-menu-item hover:text-white" th:text="#{nav.logout}" type="submit">Logout</button>
                    </form>
                </div>
                <!-- Regular nav links -->
                <div th:unless="${isAdminNav}"
                     class="flex flex-col space-y-2 md:flex-row md:items-center md:space-x-4 md:space-y-0">
                    <a class="nav-menu-item hover:text-white" href="/file/list"
                       th:if="${isFileListPageEnabled or hasAdminSession}" th:text="#{nav.viewFiles}">View Files</a>
                    <a class="nav-menu-item hover:text-white" href="/file/upload" th:text="#{nav.uploadFile}">Upload File</a>
                    <a class="nav-menu-item hover:text-white" href="/file/paste/new"
                       th:if="${isPastebinEnabled}" th:text="#{nav.pastebin}">Pastebin</a>
                    <a class="nav-menu-item hover:text-white" href="/admin/dashboard"
                       th:if="${isAdminDashboardButtonEnabled}" th:text="#{nav.adminDashboard}">Admin Dashboard</a>
                    <form th:if="${hasAdminSession or hasAppSession}" action="/admin/logout" method="post">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                        <button class="nav-menu-item hover:text-white" th:text="#{nav.logout}" type="submit">Logout</button>
                    </form>
                </div>
                <div class="flex items-center text-xs">
                    <label class="sr-only" for="localeSwitchNav" th:text="#{nav.language}">Language</label>
                    <select
                            class="locale-switch-select rounded-md border border-slate-600 bg-slate-800 text-slate-100 px-2 py-1"
                            data-locale-select="true"
                            id="localeSwitchNav"
                    >
                        <option th:selected="${currentLang == 'en'}" value="en">EN</option>
                        <option th:selected="${currentLang == 'bg'}" value="bg">BG</option>
                        <option th:selected="${currentLang == 'de'}" value="de">DE</option>
                        <option th:selected="${currentLang == 'es'}" value="es">ES</option>
                        <option th:selected="${currentLang == 'fr'}" value="fr">FR</option>
                        <option th:selected="${currentLang == 'it'}" value="it">IT</option>
                        <option th:selected="${currentLang == 'ja'}" value="ja">JA</option>
                        <option th:selected="${currentLang == 'zh'}" value="zh">ZH</option>
                    </select>
                </div>
                <button
                        aria-label="Toggle theme"
                        class="nav-menu-item theme-toggle rounded-lg p-2 transition-colors hover:bg-sky-600 dark:hover:bg-sky-500 active:scale-95 focus:outline-none focus:ring-2 focus:ring-sky-500"
                        id="themeToggle"
                        type="button"
                >
                    🌙
                </button>
            </div>
        </div>
    </div>
</nav>
</body>
</html>
