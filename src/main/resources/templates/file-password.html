<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/>
  <title th:text="#{page.password.title.browser(${appName})}">Enter Password — QuickDrop</title>
  <meta content="width=device-width, initial-scale=1" name="viewport"/>
  <link href="https://fonts.googleapis.com" rel="preconnect"/>
  <link crossorigin href="https://fonts.gstatic.com" rel="preconnect"/>
  <link href="/css/tailwind.css" rel="stylesheet"/>
  <link href="/css/custom.css" rel="stylesheet"/>
  <link href="/images/favicon.png" rel="icon" th:href="${appLogoPath}" type="image/png"/>
  <script src="/js/tailwindTheme.js"></script>
  <th:block th:replace="~{fragments/header :: scripts}"></th:block>
</head>
<body>

<div th:replace="~{fragments/header :: header(false)}"></div>

<!-- Floating orbs -->
<div aria-hidden="true" class="orb-field">
  <div class="orb orb--primary"></div>
  <div class="orb orb--secondary"></div>
</div>

<main class="gate-page hero-scene" id="main-content" style="min-height: calc(100vh - var(--nav-h, 4rem))">

  <div class="w-full max-w-sm animate-in">

    <!-- Lock icon -->
    <div class="gate-icon gate-icon--primary mx-auto mb-6">
      <svg class="w-8 h-8" fill="none" stroke="currentColor" stroke-width="1.6" viewBox="0 0 24 24">
        <path d="M16.5 10.5V6.75a4.5 4.5 0 1 0-9 0v3.75m-.75 11.25h10.5a2.25 2.25 0 0 0 2.25-2.25v-6.75a2.25 2.25 0 0 0-2.25-2.25H6.75a2.25 2.25 0 0 0-2.25 2.25v6.75a2.25 2.25 0 0 0 2.25 2.25Z" stroke-linecap="round"
              stroke-linejoin="round"/>
      </svg>
    </div>

    <div class="text-center mb-6">
      <p class="section-eyebrow mb-2" th:text="#{page.password.protectedLabel}">Protected</p>
      <h1 class="text-2xl font-extrabold tracking-tight" th:text="#{page.password.enterFile}">Enter Password</h1>
      <p class="mt-2 text-sm font-semibold break-all" style="color:var(--c-text-muted)" th:if="${fileName}"
         th:text="${fileName}"></p>
    </div>

    <div class="gate-card animate-in animate-in-delay-1">
      <form class="flex flex-col gap-5" id="passwordForm" method="post" th:action="@{/file/password}">
        <input th:name="${_csrf.parameterName}" th:value="${_csrf.token}" type="hidden"/>
        <input name="uuid" th:value="${uuid}" type="hidden"/>

        <div class="form-row">
          <label class="form-label sr-only" for="password-input" th:text="#{form.password.label}">Password</label>
          <div class="relative">
            <input
                    autocomplete="current-password"
                    class="form-input pr-12"
                    id="password-input"
                    name="password"
                    placeholder="Enter the file password…"
                    required
                    th:placeholder="#{form.password.file.placeholder}"
                    type="password"
            />
            <button
                    aria-label="Show password"
                    class="absolute right-3 top-1/2 -translate-y-1/2 p-1.5 rounded-lg transition-colors"
                    id="showPassword"
                    style="color:var(--c-text-muted)"
                    type="button"
            >
              <svg class="h-5 w-5" fill="none" id="eyeIconOpen" stroke="currentColor" stroke-width="1.5"
                   viewBox="0 0 24 24">
                <path d="M2.036 12.322a1.012 1.012 0 0 1 0-.639C3.423 7.51 7.36 4.5 12 4.5c4.638 0 8.573 3.007 9.963 7.178.07.207.07.431 0 .639C20.577 16.49 16.64 19.5 12 19.5c-4.638 0-8.573-3.007-9.963-7.178Z" stroke-linecap="round"
                      stroke-linejoin="round"/>
                <path d="M15 12a3 3 0 1 1-6 0 3 3 0 0 1 6 0Z" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
              <svg class="h-5 w-5 hidden" fill="none" id="eyeIconClosed" stroke="currentColor" stroke-width="1.5"
                   viewBox="0 0 24 24">
                <path d="M3.98 8.223A10.477 10.477 0 0 0 1.934 12C3.226 16.338 7.244 19.5 12 19.5c.993 0 1.953-.138 2.863-.395M6.228 6.228A10.451 10.451 0 0 1 12 4.5c4.756 0 8.773 3.162 10.065 7.498a10.522 10.522 0 0 1-4.293 5.774M6.228 6.228 3 3m3.228 3.228 3.65 3.65m7.894 7.894L21 21m-3.228-3.228-3.65-3.65m0 0a3 3 0 1 0-4.243-4.243m4.242 4.242L9.88 9.88" stroke-linecap="round"
                      stroke-linejoin="round"/>
              </svg>
            </button>
          </div>
        </div>

        <button class="btn btn-gradient btn-lg w-full justify-center" th:text="#{button.submit}" type="submit">Submit
        </button>
      </form>
    </div>
  </div>

</main>

<script>
  document.addEventListener('DOMContentLoaded', () => {
    const btn = document.getElementById('showPassword');
    const input = document.getElementById('password-input');
    const eyeOpen = document.getElementById('eyeIconOpen');
    const eyeClosed = document.getElementById('eyeIconClosed');
    if (btn && input && eyeOpen && eyeClosed) {
      btn.addEventListener('click', () => {
        const show = input.type === 'password';
        input.type = show ? 'text' : 'password';
        eyeOpen.classList.toggle('hidden', show);
        eyeClosed.classList.toggle('hidden', !show);
      });
    }
  });
</script>
<script src="/js/locale-switcher.js"></script>
</body>
</html>
