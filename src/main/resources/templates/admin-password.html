<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title th:text="#{page.adminPassword.title.browser(${appName})}">Admin Password — QuickDrop</title>
    <meta content="width=device-width, initial-scale=1" name="viewport"/>
    <link href="https://fonts.googleapis.com" rel="preconnect"/>
    <link crossorigin href="https://fonts.gstatic.com" rel="preconnect"/>
    <link href="/css/tailwind.css" rel="stylesheet"/>
    <link href="/css/custom.css" rel="stylesheet"/>
    <link href="/images/favicon.png" rel="icon" th:href="${appLogoPath}" type="image/png"/>
    <script src="/js/tailwindTheme.js"></script>
    <th:block th:replace="~{fragments/header :: scripts}"></th:block>
</head>
<body>

<div th:replace="~{fragments/header :: header(false)}"></div>

<!-- Floating orbs -->
<div aria-hidden="true" class="orb-field">
    <div class="orb orb--primary"></div>
    <div class="orb orb--secondary"></div>
</div>

<main class="gate-page hero-scene" id="main-content" style="min-height: calc(100vh - var(--nav-h, 4rem))">

    <div class="w-full max-w-sm animate-in">

        <!-- Icon -->
        <div class="gate-icon gate-icon--indigo mx-auto mb-6">
            <svg class="w-8 h-8" fill="none" stroke="currentColor" stroke-width="1.6" viewBox="0 0 24 24">
                <path d="M17.982 18.725A7.488 7.488 0 0 0 12 15.75a7.488 7.488 0 0 0-5.982 2.975m11.963 0a9 9 0 1 0-11.963 0m11.963 0A8.966 8.966 0 0 1 12 21a8.966 8.966 0 0 1-5.982-2.275M15 9.75a3 3 0 1 1-6 0 3 3 0 0 1 6 0Z" stroke-linecap="round"
                      stroke-linejoin="round"/>
            </svg>
        </div>

        <div class="text-center mb-8">
            <h1 class="text-2xl font-extrabold tracking-tight" th:text="#{page.adminPassword.title}">Admin Password
                Required</h1>
        </div>

        <div class="gate-card animate-in animate-in-delay-1">
            <form class="flex flex-col gap-5" id="adminPasswordForm" method="POST" th:action="@{/admin/password}">
                <input th:name="${_csrf.parameterName}" th:value="${_csrf.token}" type="hidden"/>

                <div class="form-row">
                    <label class="form-label" for="adminPassword" th:text="#{form.adminPassword.label}">Admin
                        Password</label>
                    <input
                            autocomplete="current-password"
                            class="form-input"
                            id="adminPassword"
                            name="password"
                            placeholder="Admin Password"
                            required
                            th:placeholder="#{form.adminPassword.placeholder}"
                            type="password"
                    />
                </div>

                <p class="alert alert-danger" th:if="${error}" th:text="${error}"></p>

                <button class="btn btn-gradient btn-lg w-full justify-center" th:text="#{button.submit}" type="submit">
                    Submit
                </button>
            </form>
        </div>
    </div>

</main>

<script src="/js/locale-switcher.js"></script>
</body>
</html>
