<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/>
  <title th:text="#{page.share.title.browser(${appName})}">Shared File — QuickDrop</title>
  <meta content="width=device-width, initial-scale=1" name="viewport"/>
  <link href="https://fonts.googleapis.com" rel="preconnect"/>
  <link crossorigin href="https://fonts.gstatic.com" rel="preconnect"/>
  <link href="/css/tailwind.css" rel="stylesheet"/>
  <link href="/css/custom.css" rel="stylesheet"/>
  <link href="/images/favicon.png" rel="icon" th:href="${appLogoPath}" type="image/png"/>
  <script src="/js/tailwindTheme.js"></script>
    <th:block th:replace="~{fragments/header :: scripts}"></th:block>
</head>
<body>

<div th:replace="~{fragments/header :: header(false)}"></div>

<!-- Floating orbs -->
<div aria-hidden="true" class="orb-field">
  <div class="orb orb--primary"></div>
  <div class="orb orb--secondary"></div>
</div>

<main class="gate-page hero-scene" id="main-content" style="min-height: calc(100vh - var(--nav-h, 4rem))">

  <div class="w-full max-w-md animate-in">

    <!-- File icon -->
    <div class="gate-icon gate-icon--primary mx-auto mb-6" style="width:5rem;height:5rem">
      <svg class="w-10 h-10" fill="none" stroke="currentColor" stroke-width="1.4" viewBox="0 0 24 24">
        <path d="M19.5 14.25v-2.625a3.375 3.375 0 0 0-3.375-3.375h-1.5A1.125 1.125 0 0 1 13.5 7.125v-1.5a3.375 3.375 0 0 0-3.375-3.375H8.25m2.25 0H5.625c-.621 0-1.125.504-1.125 1.125v17.25c0 .621.504 1.125 1.125 1.125h12.75c.621 0 1.125-.504 1.125-1.125V11.25a9 9 0 0 0-9-9Z" stroke-linecap="round"
              stroke-linejoin="round"/>
      </svg>
    </div>

    <!-- File identity -->
    <div class="text-center mb-6">
      <p class="section-eyebrow mb-2" th:text="#{page.share.title}">Shared File</p>
      <h1 class="text-2xl font-extrabold tracking-tight break-all mb-2" th:text="${file.name}">File Name</h1>
      <p class="text-sm" style="color:var(--c-text-muted)"
         th:if="${file.description}" th:text="${file.description}">Description</p>
    </div>

    <!-- Card -->
    <div class="gate-card animate-in animate-in-delay-1">

      <!-- Meta -->
      <dl class="grid grid-cols-2 gap-3 mb-6">
        <div class="rounded-xl px-4 py-3 flex flex-col gap-0.5"
             style="background:var(--c-surface-raised);border:1px solid var(--c-border)">
          <dt class="text-xs font-semibold uppercase tracking-wider" style="color:var(--c-text-muted)"
              th:text="#{page.share.uploaded}">Uploaded
          </dt>
          <dd class="text-sm font-bold font-mono" th:text="${#temporals.format(file.uploadDate, 'dd.MM.yyyy')}">
            01.01.2025
          </dd>
        </div>
        <div class="rounded-xl px-4 py-3 flex flex-col gap-0.5"
             style="background:var(--c-surface-raised);border:1px solid var(--c-border)">
          <dt class="text-xs font-semibold uppercase tracking-wider" style="color:var(--c-text-muted)"
              th:text="#{page.share.fileSize}">File Size
          </dt>
          <dd class="text-sm font-bold font-mono" th:text="${file.size}">—</dd>
        </div>
      </dl>

      <!-- Download CTA -->
      <a class="btn btn-gradient btn-lg w-full justify-center" id="downloadButton" th:href="${downloadLink}">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <path d="M3 16.5v2.25A2.25 2.25 0 0 0 5.25 21h13.5A2.25 2.25 0 0 0 21 18.75V16.5M16.5 12 12 16.5m0 0L7.5 12m4.5 4.5V3" stroke-linecap="round"
                stroke-linejoin="round"/>
        </svg>
        <span th:text="#{button.download}">Download</span>
      </a>
    </div>
  </div>

</main>

<script src="/js/locale-switcher.js"></script>
</body>
</html>
