<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title th:text="#{page.files.title.browser(${appName})}">Files — QuickDrop</title>
    <meta content="width=device-width, initial-scale=1" name="viewport"/>
    <link href="https://fonts.googleapis.com" rel="preconnect"/>
    <link crossorigin href="https://fonts.gstatic.com" rel="preconnect"/>
    <link href="/css/tailwind.css" rel="stylesheet"/>
    <link href="/css/custom.css" rel="stylesheet"/>
    <link href="/images/favicon.png" rel="icon" th:href="${appLogoPath}" type="image/png"/>
    <script src="/js/tailwindTheme.js"></script>
    <script src="/js/toast.js"></script>
    <th:block th:replace="~{fragments/header :: scripts}"></th:block>
</head>
<body>

<div th:replace="~{fragments/header :: header(false)}"></div>

<!-- Floating orbs -->
<div aria-hidden="true" class="orb-field">
    <div class="orb orb--primary"></div>
    <div class="orb orb--secondary"></div>
</div>

<main class="flex-1 hero-scene" id="main-content">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8 lg:py-12">

        <!-- ── Hero title (static) ──────────────────────────────────────── -->
        <div class="text-center mb-8 animate-in">
            <h1 class="page-title-xl">
                <span class="gradient-text" th:text="#{page.files.title}">All Files</span>
            </h1>
        </div>

        <!-- ── Search (static) ─────────────────────────────────────────── -->
        <div class="max-w-2xl mx-auto mb-10 animate-in animate-in-delay-1">
            <form action="/file/list" id="listSearchForm" method="GET">
                <input name="page" type="hidden" value="0"/>
                <input name="size" th:value="${pageSize}" type="hidden"/>
                <div class="search-bar" style="height: 3.25rem">
          <span class="search-bar-icon">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path
                    d="m21 21-5.197-5.197m0 0A7.5 7.5 0 1 0 5.196 5.196a7.5 7.5 0 0 0 10.607 10.607Z" stroke-linecap="round"
                    stroke-linejoin="round"/></svg>
          </span>
          <label class="sr-only" for="searchInput" th:text="#{page.files.search.label}">Search files</label>
                    <input autocomplete="off" id="searchInput" name="query"
                           placeholder="Search files by name or date…"
                           style="font-size: 0.9375rem" th:placeholder="#{page.files.search.placeholder}" th:value="${query}"
                           type="text"/>
                    <button class="btn btn-primary btn-sm" id="search-button" type="submit">
                        <span th:text="#{button.search}">Search</span>
                    </button>
                </div>
            </form>
        </div>

        <!-- ── Dynamic content (replaced on search / paginate) ──────────── -->
        <div id="listDynamicContent">

            <!-- Subtitle: count + keyboard hint -->
            <p class="text-center page-subtitle mb-8" th:if="${filesPage.totalElements > 0}">
                <span class="font-mono font-bold text-lg" style="color: var(--c-text)"
                      th:text="${filesPage.totalElements}">0</span>
                <span th:text="${filesPage.totalElements == 1} ? #{page.files.item} : #{page.files.items}">items</span>
                <span style="color: var(--c-text-faint)">·</span>
                <span class="kbd">/</span>
                <span class="ml-1" th:text="#{page.files.keyboardSearch}">to search</span>
            </p>

            <!-- ── Empty state ─────────────────────────────────────────────── -->
            <div class="flex flex-col items-center justify-center gap-6 py-24 text-center"
                 th:if="${filesPage.totalElements == 0}">
                <div class="gate-icon gate-icon--primary">
                    <svg class="w-10 h-10" fill="none" stroke="currentColor" stroke-width="1.4" viewBox="0 0 24 24">
                        <path d="M3.75 9.776c.112-.017.227-.026.344-.026h15.812c.117 0 .232.009.344.026M3.75 9.776a2.25 2.25 0 0 0-1.883 2.542l.857 6a2.25 2.25 0 0 0 2.227 1.932H19.05a2.25 2.25 0 0 0 2.227-1.932l.857-6a2.25 2.25 0 0 0-1.883-2.542M3.75 9.776V6A2.25 2.25 0 0 1 6 3.75h3.879a1.5 1.5 0 0 1 1.06.44l2.122 2.12a1.5 1.5 0 0 0 1.06.44H18A2.25 2.25 0 0 1 20.25 9v.776" stroke-linecap="round"
                              stroke-linejoin="round"/>
                    </svg>
                </div>
                <div>
                    <p class="text-xl font-bold" th:text="#{page.files.empty.title}">No files uploaded yet.</p>
                    <p class="mt-2 text-sm" style="color: var(--c-text-muted)">
                        <span th:text="#{page.files.empty.startBy}">Start by</span>
                        <a class="font-semibold underline" href="/file/upload" style="color: var(--c-primary)"
                           th:text="#{page.files.empty.uploadLink}">uploading a file</a>.
                    </p>
                </div>
                <a class="btn btn-gradient btn-xl" href="/file/upload">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                        <path d="M3 16.5v2.25A2.25 2.25 0 0 0 5.25 21h13.5A2.25 2.25 0 0 0 21 18.75V16.5m-13.5-9L12 3m0 0 4.5 4.5M12 3v13.5" stroke-linecap="round"
                              stroke-linejoin="round"/>
                    </svg>
                    <span th:text="#{nav.uploadFile}">Upload</span>
                </a>
            </div>

            <!-- ── File grid ────────────────────────────────────────────────── -->
            <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-5"
                 th:if="${filesPage.totalElements > 0}">
                <a class="file-card group"
                   style="text-decoration:none; color:inherit; animation: qd-fade-in-up 400ms var(--ease-out-expo) both"
                   th:each="file, iterStat : ${filesPage.content}"
                   th:href="@{/file/{UUID}(UUID=${file.uuid})}"
                   th:styleappend="'animation-delay:' + ${iterStat.index * 60} + 'ms'">

                    <div class="flex items-start gap-3">
                        <div class="file-card-icon">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="1.6"
                                 viewBox="0 0 24 24">
                                <path d="M19.5 14.25v-2.625a3.375 3.375 0 0 0-3.375-3.375h-1.5A1.125 1.125 0 0 1 13.5 7.125v-1.5a3.375 3.375 0 0 0-3.375-3.375H8.25m2.25 0H5.625c-.621 0-1.125.504-1.125 1.125v17.25c0 .621.504 1.125 1.125 1.125h12.75c.621 0 1.125-.504 1.125-1.125V11.25a9 9 0 0 0-9-9Z" stroke-linecap="round"
                                      stroke-linejoin="round"/>
                            </svg>
                        </div>
                        <div class="min-w-0 flex-1">
                            <p class="file-card-name" th:text="${file.name}" th:title="${file.name}">filename.zip</p>
                            <p class="file-card-meta mt-1">
                                <span th:text="${#temporals.format(file.uploadDate, 'dd.MM.yyyy')}">01.01.2025</span>
                                <span style="color: var(--c-text-faint)">·</span>
                                <span th:text="${file.size}">—</span>
                            </p>
                        </div>
                    </div>

                    <p class="text-sm line-clamp-2"
                       style="color: var(--c-text-muted)" th:if="${!#strings.isEmpty(file.description)}"
                       th:text="${file.description}"></p>

                    <div class="flex flex-wrap gap-1.5">
            <span class="badge badge-secondary" th:if="${file.passwordProtected}">
              <svg class="w-2.5 h-2.5" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path
                      d="M16.5 10.5V6.75a4.5 4.5 0 1 0-9 0v3.75m-.75 11.25h10.5a2.25 2.25 0 0 0 2.25-2.25v-6.75a2.25 2.25 0 0 0-2.25-2.25H6.75a2.25 2.25 0 0 0-2.25 2.25v6.75a2.25 2.25 0 0 0 2.25 2.25Z" stroke-linecap="round"
                      stroke-linejoin="round"/></svg>
              <span th:text="#{page.password.protectedLabel}">Protected</span>
            </span>
                        <span class="badge badge-teal" th:if="${file.keepIndefinitely}">
              <span class="status-dot status-dot--static"
                    style="color: var(--c-teal); width:0.4rem; height:0.4rem"></span>
              <span th:text="#{badge.permanent}">Permanent</span>
            </span>
                        <span class="badge badge-neutral" th:unless="${file.keepIndefinitely}">
              <svg class="w-2.5 h-2.5" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path
                      d="M12 6v6h4.5m4.5 0a9 9 0 1 1-18 0 9 9 0 0 1 18 0Z" stroke-linecap="round"
                      stroke-linejoin="round"/></svg>
              <span th:text="#{badge.autoExpires}">Auto-expires</span>
            </span>
          </div>

                    <div class="mt-auto flex items-center justify-between pt-3"
                         style="border-top: 1px dashed var(--c-border)">
                        <span class="text-xs font-bold" style="color: var(--c-primary)"
                              th:text="#{page.files.goToFilePage}">View file</span>
                        <svg class="w-4 h-4 transition-transform duration-300 group-hover:translate-x-1"
                             fill="none" stroke="currentColor" stroke-width="2" style="color: var(--c-primary)"
                             viewBox="0 0 24 24">
                            <path d="M13.5 4.5 21 12m0 0-7.5 7.5M21 12H3" stroke-linecap="round"
                                  stroke-linejoin="round"/>
                        </svg>
                    </div>
                </a>
      </div>

            <!-- ── Pagination ────────────────────────────────────────────── -->
            <div class="flex flex-col sm:flex-row items-center justify-between gap-4 mt-10 pt-6"
                 style="border-top: 1px solid var(--c-border)"
                 th:if="${filesPage.totalElements > 0}">
        <div class="flex items-center gap-2">
            <a class="pagination-btn"
               th:classappend="${filesPage.first} ? ' pagination-btn-disabled'"
               th:href="@{/file/list(page=${filesPage.first ? filesPage.number : filesPage.number - 1}, size=${pageSize}, query=${query})}"
               th:text="#{pagination.previous}">Previous</a>
            <a class="pagination-btn"
               th:classappend="${filesPage.last} ? ' pagination-btn-disabled'"
               th:href="@{/file/list(page=${filesPage.last ? filesPage.number : filesPage.number + 1}, size=${pageSize}, query=${query})}"
               th:text="#{pagination.next}">Next</a>
        </div>

                <p class="text-sm font-mono" style="color: var(--c-text-muted)">
                    <span th:text="#{pagination.page}">Page</span>
                    <span th:text="${filesPage.number + 1}"></span>
                    <span th:text="#{pagination.of}">of</span>
                    <span th:text="${filesPage.totalPages}"></span>
                </p>

                <form action="/file/list" class="flex items-center gap-2" data-perpage-form method="get">
                    <input name="query" th:value="${query}" type="hidden"/>
                    <input name="page" type="hidden" value="0"/>
                    <label class="text-sm" for="pageSize" style="color: var(--c-text-muted)"
                           th:text="#{pagination.perPage}">Per page</label>
                    <select class="form-input" id="pageSize"
                            name="size" style="width:auto; padding:0.3125rem 0.5rem">
                        <option th:selected="${pageSize == 10}" value="10">10</option>
                        <option th:selected="${pageSize == 20}" value="20">20</option>
                        <option th:selected="${pageSize == 50}" value="50">50</option>
            <option th:selected="${pageSize == 100}" value="100">100</option>
          </select>
        </form>
            </div>

        </div><!-- /listDynamicContent -->

    </div>
</main>

<script src="/js/spa.js"></script>
<script src="/js/list-files.js"></script>
<script src="/js/locale-switcher.js"></script>
</body>
</html>
