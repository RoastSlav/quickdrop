<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title th:text="#{page.paste.title.browser(${appName})}">Pastebin — QuickDrop</title>
    <meta content="width=device-width, initial-scale=1" name="viewport"/>
    <link href="https://fonts.googleapis.com" rel="preconnect"/>
    <link crossorigin href="https://fonts.gstatic.com" rel="preconnect"/>
    <link href="/css/tailwind.css" rel="stylesheet"/>
    <link href="/css/custom.css" rel="stylesheet"/>
    <link href="https://cdn.jsdelivr.net/npm/easymde/dist/easymde.min.css" rel="stylesheet"/>
    <link href="/images/favicon.png" rel="icon" th:href="${appLogoPath}" type="image/png"/>
    <script src="/js/tailwindTheme.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <th:block th:replace="~{fragments/header :: scripts}"></th:block>
    <style>
        .editor-wrapper .CodeMirror {
            min-height: 22rem;
            height: auto;
            border-radius: 0 0 1rem 1rem;
            border: 1px solid var(--c-border-strong);
            border-top: none;
            background-color: var(--c-surface);
            color: var(--c-text);
            font-family: 'JetBrains Mono', ui-monospace, 'Cascadia Code', 'Fira Code', monospace;
        }

        .editor-wrapper .editor-preview,
        .editor-wrapper .editor-preview-side {
            font-size: 1rem;
            line-height: 1.6;
            background-color: var(--c-surface);
            color: var(--c-text);
        }

        .editor-wrapper .CodeMirror-cursor {
            border-left-color: var(--c-text);
        }

        .editor-wrapper .manual-preview-pane {
            display: none;
            max-height: 72vh;
            overflow: auto;
            border: 1px solid var(--c-border-strong);
            border-radius: 1rem;
            background-color: var(--c-surface);
            padding: 1.5rem;
            color: var(--c-text);
        }

        .editor-wrapper.manual-preview-active .manual-preview-pane {
            display: block;
        }

        .editor-wrapper.manual-preview-active .EasyMDEContainer .CodeMirror,
        .editor-wrapper.manual-preview-active .EasyMDEContainer .editor-statusbar {
            display: none !important;
        }

        .markdown-content h1, .markdown-content h2, .markdown-content h3,
        .markdown-content h4, .markdown-content h5, .markdown-content h6 {
            margin-top: 1.25rem;
            margin-bottom: .75rem;
            font-weight: 700;
            line-height: 1.25;
        }

        .markdown-content h1 {
            font-size: 1.875rem;
        }

        .markdown-content h2 {
            font-size: 1.5rem;
        }

        .markdown-content h3 {
            font-size: 1.25rem;
        }

        .markdown-content p, .markdown-content ul, .markdown-content ol,
        .markdown-content pre, .markdown-content blockquote, .markdown-content table {
            margin: .75rem 0;
        }

        .markdown-content ul {
            list-style: disc;
            padding-left: 1.25rem;
        }

        .markdown-content ol {
            list-style: decimal;
            padding-left: 1.25rem;
        }

        .markdown-content code {
            background-color: var(--c-surface-raised);
            border-radius: .25rem;
            padding: .1rem .3rem;
            font-family: 'JetBrains Mono', ui-monospace, monospace;
        }

        .markdown-content pre {
            background-color: var(--c-surface-raised);
            border-radius: .5rem;
            overflow: auto;
            padding: .75rem;
        }

        .markdown-content pre code {
            background: transparent;
            padding: 0;
        }

        .markdown-content hr {
            border: 0;
            border-top: 1px solid var(--c-border-strong);
            margin: 1rem 0;
        }

        .markdown-content a {
            color: var(--c-primary);
            text-decoration: underline;
        }

        .markdown-content blockquote {
            border-left: 3px solid var(--c-primary);
            padding-left: .75rem;
            color: var(--c-text-muted);
        }

        .custom-editor-toolbar {
            display: flex;
            flex-wrap: wrap;
            gap: .375rem;
            border: 1px solid var(--c-border-strong);
            border-bottom: none;
            border-radius: 1rem 1rem 0 0;
            padding: .625rem .875rem;
            background-color: var(--c-surface-raised);
        }

        .custom-editor-toolbar button {
            border: 1px solid var(--c-border-strong);
            border-radius: .5rem;
            background-color: var(--c-surface);
            color: var(--c-text);
            font-size: .9rem;
            font-weight: 600;
            line-height: 1;
            padding: .375rem .5rem;
            min-width: 2rem;
            min-height: 2rem;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all .2s;
        }

        .custom-editor-toolbar button svg {
            width: 1rem;
            height: 1rem;
            display: block;
        }

        .custom-editor-toolbar button:hover {
            background-color: var(--c-primary-muted);
            border-color: var(--c-primary);
            color: var(--c-primary);
        }

        .custom-editor-toolbar button[aria-pressed="true"] {
            background: var(--g-brand);
            border-color: transparent;
            color: #fff;
        }

        .preview-tool-button {
            margin-left: auto;
            gap: .35rem;
            padding: .375rem .75rem;
        }
    </style>
</head>
<body>

<div th:replace="~{fragments/header :: header(false)}"></div>

<!-- Floating orbs -->
<div aria-hidden="true" class="orb-field">
    <div class="orb orb--primary"></div>
    <div class="orb orb--secondary"></div>
</div>

<main class="flex-1 hero-scene">
    <div class="max-w-6xl mx-auto px-4 sm:px-6 lg:px-8 py-8 lg:py-12">

        <!-- Hero -->
        <div class="text-center mb-8 animate-in">
            <h1 class="page-title-xl">
                <span class="gradient-text" th:text="${isEditMode} ? #{page.paste.editTitle} : #{page.paste.newTitle}">New Paste</span>
            </h1>
        </div>

        <!-- Editor card -->
        <div class="card-glass card-xl animate-in animate-in-delay-1" style="padding: 2rem">
            <form class="flex flex-col gap-5" id="pasteForm" method="post" th:action="${pasteFormAction}">
                <input th:name="${_csrf.parameterName}" th:value="${_csrf.token}" type="hidden"/>

                <div class="alert alert-danger" th:if="${pasteError != null}" th:text="${pasteError}"></div>

                <!-- Title + mode -->
                <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                    <div class="form-row">
                        <label class="form-label" th:text="#{page.paste.field.title}">Title</label>
                        <input class="form-input" maxlength="255" name="title" placeholder="example-note" required
                               th:value="${pasteTitle}" type="text"/>
                    </div>
                    <div class="form-row">
                        <label class="form-label" for="syntax" th:text="#{page.paste.field.mode}">Mode</label>
                        <select class="form-input" id="syntax" name="syntax">
                            <option th:selected="${pasteSyntax != 'markdown'}" th:text="#{page.paste.mode.text}"
                                    value="text">Plain Text (.txt)
                            </option>
                            <option th:selected="${pasteSyntax == 'markdown'}" th:text="#{page.paste.mode.markdown}"
                                    value="markdown">Markdown (.md)
                            </option>
                        </select>
                    </div>
        </div>

                <!-- Editor controls -->
                <div class="flex flex-wrap items-center gap-4 text-sm p-3 rounded-xl"
                     style="background: var(--c-surface-raised); border: 1px solid var(--c-border)">
                    <label class="form-check">
                        <input id="lineNumbersToggle" style="accent-color: var(--c-primary)" type="checkbox"/>
                        <span th:text="#{page.paste.lineNumbers}">Line numbers</span>
                    </label>
                    <label class="form-check">
                        <input checked id="wordWrapToggle" style="accent-color: var(--c-primary)" type="checkbox"/>
                        <span th:text="#{page.paste.wordWrap}">Word wrap</span>
                    </label>
                    <div class="flex items-center gap-2">
                        <span class="text-sm" th:text="#{page.paste.fontSize}">Font size</span>
                        <select class="form-input" id="fontSizeSelect" style="width:auto;padding:.25rem .5rem">
                            <option value="12px">12</option>
                            <option selected value="14px">14</option>
                            <option value="16px">16</option>
                            <option value="18px">18</option>
                        </select>
                    </div>
        </div>

                <!-- Editor -->
        <div class="editor-wrapper">
            <div class="custom-editor-toolbar" id="customEditorToolbar">
                <button aria-label="Bold" data-action="bold" title="Bold" type="button">
                    <svg fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"
                         stroke-width="2" viewBox="0 0 24 24">
                        <path d="M6 4h7a4 4 0 1 1 0 8H6z"/>
                        <path d="M6 12h8a4 4 0 1 1 0 8H6z"/>
                    </svg>
                </button>
                <button aria-label="Italic" data-action="italic" title="Italic" type="button">
                    <svg fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"
                         stroke-width="2" viewBox="0 0 24 24">
                        <line x1="19" x2="10" y1="4" y2="4"/>
                        <line x1="14" x2="5" y1="20" y2="20"/>
                        <line x1="15" x2="9" y1="4" y2="20"/>
                    </svg>
                </button>
                <button aria-label="Heading" data-action="heading" title="Heading" type="button">
                    <svg fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"
                         stroke-width="2" viewBox="0 0 24 24">
                        <path d="M5 4v16"/>
                        <path d="M19 4v16"/>
                        <path d="M5 12h14"/>
                    </svg>
                </button>
                <button aria-label="Quote" data-action="quote" title="Quote" type="button">
                    <svg fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"
                         stroke-width="2" viewBox="0 0 24 24">
                        <path d="M8 17H5a2 2 0 0 1-2-2v-3a6 6 0 0 1 6-6h1"/>
                        <path d="M19 17h-3a2 2 0 0 1-2-2v-3a6 6 0 0 1 6-6h1"/>
                    </svg>
                </button>
                <button aria-label="Bulleted list" data-action="unordered-list" title="Bulleted list" type="button">
                    <svg fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"
                         stroke-width="2" viewBox="0 0 24 24">
                        <line x1="9" x2="20" y1="6" y2="6"/>
                        <line x1="9" x2="20" y1="12" y2="12"/>
                        <line x1="9" x2="20" y1="18" y2="18"/>
                        <circle cx="4" cy="6" r="1"/>
                        <circle cx="4" cy="12" r="1"/>
                        <circle cx="4" cy="18" r="1"/>
                    </svg>
                </button>
                <button aria-label="Numbered list" data-action="ordered-list" title="Numbered list" type="button">
                    <svg fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"
                         stroke-width="2" viewBox="0 0 24 24">
                        <line x1="9" x2="20" y1="6" y2="6"/>
                        <line x1="9" x2="20" y1="12" y2="12"/>
                        <line x1="9" x2="20" y1="18" y2="18"/>
                        <path d="M4 7V5l-1 1"/>
                        <path d="M3 11h2l-2 3h2"/>
                        <path d="M3 17c0-.7.5-1.2 1.2-1.2H5v2.4"/>
                    </svg>
                </button>
                <button aria-label="Insert link" data-action="link" title="Insert link" type="button">
                    <svg fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"
                         stroke-width="2" viewBox="0 0 24 24">
                        <path d="M10 13a5 5 0 0 1 0-7l1.5-1.5a5 5 0 0 1 7 7L17 13"/>
                        <path d="M14 11a5 5 0 0 1 0 7L12.5 19.5a5 5 0 0 1-7-7L7 11"/>
                    </svg>
                </button>
                <button aria-label="Insert image" data-action="image" title="Insert image" type="button">
                    <svg fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"
                         stroke-width="2" viewBox="0 0 24 24">
                        <rect height="16" rx="2" width="18" x="3" y="4"/>
                        <circle cx="8.5" cy="9" r="1.5"/>
                        <path d="M21 16l-4.5-4.5L7 21"/>
                    </svg>
                </button>
                <button aria-label="Insert table" data-action="table" title="Insert table" type="button">
                    <svg fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"
                         stroke-width="2" viewBox="0 0 24 24">
                        <rect height="16" rx="2" width="18" x="3" y="4"/>
                        <path d="M3 10h18"/>
                        <path d="M9 4v16"/>
                        <path d="M15 4v16"/>
                    </svg>
                </button>
                <button aria-label="Code block" data-action="code" title="Code block" type="button">
                    <svg fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"
                         stroke-width="2" viewBox="0 0 24 24">
                        <polyline points="8 6 2 12 8 18"/>
                        <polyline points="16 6 22 12 16 18"/>
                    </svg>
                </button>
                <button aria-label="Horizontal rule" data-action="hr" title="Horizontal rule" type="button">
                    <svg fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"
                         stroke-width="2" viewBox="0 0 24 24">
                        <line x1="3" x2="21" y1="12" y2="12"/>
                    </svg>
                </button>
                <button aria-label="Preview" aria-pressed="false" class="preview-tool-button" data-action="preview"
                        id="previewToolButton" title="Preview" type="button">
                    <svg fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"
                         stroke-width="2" viewBox="0 0 24 24">
                        <path d="M1 12s4-7 11-7 11 7 11 7-4 7-11 7S1 12 1 12z"/>
                        <circle cx="12" cy="12" r="3"/>
                    </svg>
                    <span th:text="#{page.paste.preview}">Preview</span>
                </button>
            </div>
            <textarea id="content" name="content" placeholder="Write your text here…"
                      th:placeholder="#{page.paste.content.placeholder}" th:text="${pasteContent}"></textarea>
            <div class="manual-preview-pane markdown-content" id="manualPreviewPane"></div>
        </div>

                <!-- Password -->
                <div class="form-row" th:if="${uploadPasswordEnabled and !isEditMode}">
                    <label class="form-label" for="password" th:text="#{page.paste.password.label}">Password
                        (optional)</label>
                    <input class="form-input" id="password" name="password"
                           placeholder="Set password to protect this paste"
                           th:placeholder="#{page.paste.password.placeholder}" type="password"/>
                    <p class="form-hint" th:text="#{page.paste.password.help}">Leave empty to remove password
                        protection.</p>
                </div>

                <!-- Save row: toggle left, button right -->
                <div class="flex items-center gap-4 pt-2">
                    <label class="toggle-switch" th:if="${canUseKeepIndefinitely}">
                        <input class="sr-only" name="keepIndefinitely" th:checked="${keepIndefinitely}" type="checkbox"
                               value="true"/>
                        <span class="toggle-track"><span class="toggle-thumb"></span></span>
                        <span class="text-sm" th:text="#{form.keepIndefinitely}">Keep indefinitely</span>
                    </label>
                    <button class="btn btn-gradient btn-lg ml-auto" id="savePasteButton" th:text="${isEditMode} ? #{page.paste.saveChanges} : #{page.paste.save}"
                            type="submit">Save Paste
                    </button>
                </div>
            </form>
        </div>
    </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/easymde/dist/easymde.min.js"></script>
<script th:inline="javascript">
    const emptyPasteMessage = /*[[#{page.paste.content.empty}]]*/ "Paste content cannot be empty.";
    const markedApi = window.marked;
    const markdownRuntimeAvailable = !!markedApi && typeof markedApi.setOptions === "function" && typeof markedApi.parse === "function";
    if (markdownRuntimeAvailable) markedApi.setOptions({gfm: true, breaks: true});

    function renderMarkdownLikePasteView(plainText) {
        if (markdownRuntimeAvailable) {
            try {
                return markedApi.parse(plainText);
            } catch (_) {
            }
        }
        return this.parent.markdown(plainText);
    }

    const editor = new EasyMDE({
        element: document.getElementById("content"),
        spellChecker: false,
        autoDownloadFontAwesome: false,
        status: ["lines", "words", "cursor"],
        toolbar: false,
        previewRender: renderMarkdownLikePasteView,
    });

    const lineNumbersToggle = document.getElementById("lineNumbersToggle");
    const wordWrapToggle = document.getElementById("wordWrapToggle");
    const fontSizeSelect = document.getElementById("fontSizeSelect");
    const form = document.getElementById("pasteForm");
    const savePasteButton = document.getElementById("savePasteButton");
    const textarea = document.getElementById("content");
    const customEditorToolbar = document.getElementById("customEditorToolbar");
    const syntaxSelect = document.getElementById("syntax");
    const previewToolButton = document.getElementById("previewToolButton");
    const editorWrapper = document.querySelector(".editor-wrapper");
    const manualPreviewPane = document.getElementById("manualPreviewPane");

    function isPreviewActive() {
        return !!(editorWrapper && editorWrapper.classList.contains("manual-preview-active"));
    }

    function escapeHtml(v) {
        return v.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;").replace(/'/g, "&#39;");
    }

    function renderPreviewContent() {
        if (!manualPreviewPane) return;
        const txt = editor.value();
        if (markdownRuntimeAvailable) {
            try {
                manualPreviewPane.innerHTML = markedApi.parse(txt);
                return;
            } catch (_) {
            }
        }
        manualPreviewPane.innerHTML = `<pre class="whitespace-pre-wrap break-words">${escapeHtml(txt)}</pre>`;
    }

    function syncPreviewButtonState() {
        const active = isPreviewActive();
        previewToolButton.setAttribute("aria-pressed", active ? "true" : "false");
        if (editorWrapper) editorWrapper.classList.toggle("manual-preview-active", active);
    }

    const editorActions = {
        bold: EasyMDE.toggleBold, italic: EasyMDE.toggleItalic, heading: EasyMDE.toggleHeadingSmaller,
        quote: EasyMDE.toggleBlockquote, "unordered-list": EasyMDE.toggleUnorderedList,
        "ordered-list": EasyMDE.toggleOrderedList, link: EasyMDE.drawLink, image: EasyMDE.drawImage,
        table: EasyMDE.drawTable, code: EasyMDE.toggleCodeBlock, hr: EasyMDE.drawHorizontalRule,
        preview: () => {
            const nextActive = !isPreviewActive();
            if (nextActive) renderPreviewContent();
            if (editorWrapper) editorWrapper.classList.toggle("manual-preview-active", nextActive);
            syncPreviewButtonState();
        },
    };

    customEditorToolbar.addEventListener("click", (e) => {
        const btn = e.target.closest("button[data-action]");
        if (!btn) return;
        const action = editorActions[btn.dataset.action];
        if (typeof action === "function") {
            action(editor);
            if (!isPreviewActive()) editor.codemirror.focus();
        }
    });

    function applyEditorSettings() {
        editor.codemirror.setOption("lineNumbers", lineNumbersToggle.checked);
        editor.codemirror.setOption("lineWrapping", wordWrapToggle.checked);
        editor.codemirror.getWrapperElement().style.fontSize = fontSizeSelect.value;
    }

    lineNumbersToggle.addEventListener("change", applyEditorSettings);
    wordWrapToggle.addEventListener("change", applyEditorSettings);
    fontSizeSelect.addEventListener("change", applyEditorSettings);
    applyEditorSettings();

    function applyModeControls() {
        const md = syntaxSelect.value === "markdown";
        previewToolButton.classList.toggle("hidden", !md);
        if (!md && isPreviewActive()) editorWrapper && editorWrapper.classList.remove("manual-preview-active");
        syncPreviewButtonState();
    }

    editor.codemirror.on("change", () => {
        if (isPreviewActive()) renderPreviewContent();
    });
    syntaxSelect.addEventListener("change", applyModeControls);
    applyModeControls();

    form.addEventListener("submit", (e) => {
        const val = editor.value().trim();
        textarea.value = editor.value();
        if (!val) {
            e.preventDefault();
            alert(emptyPasteMessage);
            editor.codemirror.focus();
            return;
        }
        savePasteButton.disabled = true;
        savePasteButton.classList.add("opacity-70", "cursor-not-allowed");
    });
</script>
<script src="/js/locale-switcher.js"></script>
</body>
</html>
