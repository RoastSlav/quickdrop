<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title th:text="#{page.adminPastes.title.browser(${appName})}">Pastes — Admin</title>
    <meta content="width=device-width, initial-scale=1" name="viewport"/>
    <link href="https://fonts.googleapis.com" rel="preconnect"/>
    <link crossorigin href="https://fonts.gstatic.com" rel="preconnect"/>
    <link href="/css/tailwind.css" rel="stylesheet"/>
    <link href="/css/custom.css" rel="stylesheet"/>
    <link href="/images/favicon.png" rel="icon" th:href="${appLogoPath}" type="image/png"/>
    <script src="/js/tailwindTheme.js"></script>
    <script src="/js/toast.js"></script>
    <script src="/js/counter.js"></script>
    <th:block th:replace="~{fragments/header :: scripts}"></th:block>
</head>
<body>

<div th:replace="~{fragments/header :: header(false)}"></div>

<div aria-hidden="true" class="orb-field">
    <div class="orb orb--primary"></div>
    <div class="orb orb--secondary"></div>
</div>

<main class="flex-1 hero-scene" id="main-content">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8 lg:py-12">

        <!-- Back -->
        <div class="mb-6 animate-in">
            <a class="btn btn-ghost btn-sm inline-flex items-center gap-1.5" href="/admin/dashboard">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                    <path d="M10.5 19.5 3 12m0 0 7.5-7.5M3 12h18" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
                <span th:text="#{nav.admin}">Admin</span>
            </a>
        </div>

        <!-- Hero header -->
        <div class="flex flex-wrap items-center justify-between gap-4 mb-8 animate-in">
            <h1 class="page-title-xl">
                <span class="gradient-text" th:text="#{page.adminPastes.title}">Pastes</span>
            </h1>
        </div>

        <!-- Stats row -->
        <div class="grid grid-cols-2 sm:grid-cols-4 gap-4 lg:gap-5 mb-8 animate-in animate-in-delay-1">
            <div class="stat-hero stat-hero--primary">
                <span class="stat-hero-label" th:text="#{page.dashboard.totalPastes}">Total Pastes</span>
                <span class="stat-hero-value" th:attr="data-counter-target=${analytics.totalPastes}"
                      th:text="${analytics.totalPastes}">0</span>
            </div>
            <div class="stat-hero stat-hero--secondary">
                <span class="stat-hero-label" th:text="#{page.dashboard.totalPasteViews}">Total Views</span>
                <span class="stat-hero-value" th:attr="data-counter-target=${analytics.totalPasteViews}"
                      th:text="${analytics.totalPasteViews}">0</span>
            </div>
            <div class="stat-hero stat-hero--teal">
                <span class="stat-hero-label" th:text="#{page.dashboard.averagePasteLength}">Avg. Length</span>
                <span class="stat-hero-value" th:text="${analytics.averagePasteLength}">0 B</span>
            </div>
            <div class="stat-hero" style="background:var(--c-surface-raised);border:1px solid var(--c-border)">
                <span class="stat-hero-label" th:text="#{page.dashboard.pasteTypes}">Types</span>
                <span class="stat-hero-value text-lg"
                      th:text="${analytics.markdownPasteCount} + ' / ' + ${analytics.plainTextPasteCount}">0 / 0</span>
                <span class="stat-hero-sub" th:text="#{page.dashboard.mdVsText}">Markdown / Plain</span>
            </div>
        </div>

        <!-- Pastes section -->
        <div class="card card-xl animate-in animate-in-delay-2" id="pasteSectionWrapper">

            <div class="flex flex-col gap-5 mb-6">
                <div class="flex flex-wrap items-center justify-between gap-4">
                    <h2 class="section-title flex items-center gap-2">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="1.8"
                             style="color:var(--c-primary)"
                             viewBox="0 0 24 24">
                            <path d="M17.25 6.75 22.5 12l-5.25 5.25m-10.5 0L1.5 12l5.25-5.25m7.5-3-4.5 16.5"
                                  stroke-linecap="round"
                                  stroke-linejoin="round"/>
                        </svg>
                        <span th:text="#{page.adminPastes.heading}">Pastes</span>
                    </h2>
                    <span class="badge badge-primary font-mono text-sm"
                          th:text="${pastesPage.totalElements} + ' ' + #{page.dashboard.total}">0 total</span>
                </div>

                <form action="/admin/pastes" class="flex flex-col sm:flex-row gap-3" id="pasteSearchForm" method="get">
                    <input name="page" type="hidden" value="0"/>
                    <input name="size" th:value="${pageSize}" type="hidden"/>
                    <div class="search-bar flex-1">
            <span class="search-bar-icon">
              <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path
                      d="m21 21-5.197-5.197m0 0A7.5 7.5 0 1 0 5.196 5.196a7.5 7.5 0 0 0 10.607 10.607Z"
                      stroke-linecap="round"
                      stroke-linejoin="round"/></svg>
            </span>
                        <label class="sr-only" for="pasteSearch" th:text="#{page.adminPastes.search.label}">Search
                            pastes</label>
                        <input autocomplete="off" id="pasteSearch" name="query"
                               th:placeholder="#{page.adminPastes.search.placeholder}"
                               th:value="${query}" type="text"/>
                        <span class="kbd hidden sm:inline">/</span>
                    </div>
                    <button class="btn btn-primary" type="submit">
                        <span th:text="#{button.search}">Search</span>
                    </button>
                </form>
            </div>

            <!-- Dynamic content -->
            <div id="pasteDynamicContent">

                <!-- Empty state -->
                <div class="text-center py-16" th:if="${pastesPage.totalElements == 0}">
                    <div class="gate-icon gate-icon--primary mx-auto mb-6">
                        <svg class="w-10 h-10" fill="none" stroke="currentColor" stroke-width="1.4" viewBox="0 0 24 24">
                            <path d="M17.25 6.75 22.5 12l-5.25 5.25m-10.5 0L1.5 12l5.25-5.25m7.5-3-4.5 16.5"
                                  stroke-linecap="round"
                                  stroke-linejoin="round"/>
                        </svg>
                    </div>
                    <p class="text-lg font-semibold" style="color: var(--c-text-muted)"
                       th:text="#{page.adminPastes.noFilesFound}">No pastes found.</p>
                </div>

                <!-- Paste cards -->
                <div class="flex flex-col gap-2.5" th:if="${pastesPage.totalElements > 0}">
                    <div class="group flex flex-col sm:flex-row sm:items-center gap-3 sm:gap-4 px-4 py-3.5 rounded-2xl transition-all duration-200 hover:shadow-md"
                         style="animation: qd-fade-in-up 350ms var(--ease-out-expo) both"
                         th:attr="data-uuid=${paste.uuid}"
                         th:each="paste, iterStat : ${pastesPage.content}"
                         th:style="'animation-delay:' + ${iterStat.index * 35} + 'ms; background: var(--c-surface-raised); border: 1px solid var(--c-border); border-left: 4px solid ' + (${paste.isMarkdown} ? 'var(--c-indigo,var(--c-primary))' : 'var(--c-primary)')">

                        <!-- Paste icon + name + meta -->
                        <div class="flex items-center gap-3 min-w-0 flex-1">
                            <div class="w-9 h-9 rounded-xl flex items-center justify-center flex-shrink-0"
                                 th:style="${paste.isMarkdown} ? 'background:var(--c-indigo-muted);color:var(--c-indigo,var(--c-primary))' : 'background:var(--c-primary-muted);color:var(--c-primary)'">
                                <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="1.6"
                                     viewBox="0 0 24 24">
                                    <path d="M17.25 6.75 22.5 12l-5.25 5.25m-10.5 0L1.5 12l5.25-5.25m7.5-3-4.5 16.5"
                                          stroke-linecap="round"
                                          stroke-linejoin="round"/>
                                </svg>
                            </div>
                            <div class="min-w-0 flex-1">
                                <p class="font-bold text-sm truncate"
                                   th:text="${#strings.isEmpty(paste.name) ? #messages.msg('page.pasteView.untitled') : paste.name}"
                                   th:title="${paste.name}">Untitled paste</p>
                                <p class="text-xs font-mono mt-0.5" style="color: var(--c-text-faint)">
                                    <span th:text="${#temporals.format(paste.uploadDate, 'dd.MM.yyyy')}">01.01.2025</span>
                                    <span class="opacity-40 mx-0.5">·</span>
                                    <span th:text="${paste.size}">—</span>
                                    <span class="opacity-40 mx-0.5">·</span>
                                    <span th:text="${paste.totalViews}">0</span>
                                    <svg class="w-3 h-3 inline-block mb-0.5 ml-0.5 opacity-50" fill="none"
                                         stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
                                        <path d="M2.036 12.322a1.012 1.012 0 0 1 0-.639C3.423 7.51 7.36 4.5 12 4.5c4.638 0 8.573 3.007 9.963 7.178.07.207.07.431 0 .639C20.577 16.49 16.64 19.5 12 19.5c-4.638 0-8.573-3.007-9.963-7.178Z"
                                              stroke-linecap="round" stroke-linejoin="round"/>
                                        <path d="M15 12a3 3 0 1 1-6 0 3 3 0 0 1 6 0Z" stroke-linecap="round"
                                              stroke-linejoin="round"/>
                                    </svg>
                                    <span class="opacity-40 mx-0.5">·</span>
                                    <span th:text="${paste.isMarkdown} ? #{page.adminPastes.markdown} : #{page.adminPastes.plainText}">Plain</span>
                                    <span class="ml-1" th:if="${paste.passwordProtected}">🔒</span>
                                </p>
                            </div>
                        </div>

                        <!-- Actions -->
                        <div class="flex items-center gap-1.5 flex-shrink-0 pl-12 sm:pl-0">
                            <a class="btn btn-soft-primary btn-sm" th:href="@{/file/{uuid}(uuid=${paste.uuid})}"
                               th:title="#{button.view}">
                                <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" stroke-width="2"
                                     viewBox="0 0 24 24">
                                    <path d="M2.036 12.322a1.012 1.012 0 0 1 0-.639C3.423 7.51 7.36 4.5 12 4.5c4.638 0 8.573 3.007 9.963 7.178.07.207.07.431 0 .639C20.577 16.49 16.64 19.5 12 19.5c-4.638 0-8.573-3.007-9.963-7.178Z"
                                          stroke-linecap="round" stroke-linejoin="round"/>
                                    <path d="M15 12a3 3 0 1 1-6 0 3 3 0 0 1 6 0Z" stroke-linecap="round"
                                          stroke-linejoin="round"/>
                                </svg>
                                <span class="hidden sm:inline" th:text="#{button.view}">View</span>
                            </a>
                            <a class="btn btn-ghost btn-sm"
                               th:href="@{/admin/pastes/{uuid}/history(uuid=${paste.uuid})}"
                               th:title="#{button.history}">
                                <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" stroke-width="2"
                                     viewBox="0 0 24 24">
                                    <path d="M12 6v6h4.5m4.5 0a9 9 0 1 1-18 0 9 9 0 0 1 18 0Z" stroke-linecap="round"
                                          stroke-linejoin="round"/>
                                </svg>
                                <span class="hidden sm:inline" th:text="#{button.history}">History</span>
                            </a>
                            <form data-delete-form method="post" style="display:contents"
                                  th:action="@{/admin/delete/{uuid}(uuid=${paste.uuid})}">
                                <input th:name="${_csrf.parameterName}" th:value="${_csrf.token}" type="hidden"/>
                                <input name="source" type="hidden" value="pastes"/>
                                <button class="btn btn-danger btn-sm" th:title="#{button.delete}" type="submit">
                                    <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" stroke-width="2"
                                         viewBox="0 0 24 24">
                                        <path d="m14.74 9-.346 9m-4.788 0L9.26 9m9.968-3.21c.342.052.682.107 1.022.166m-1.022-.165L18.16 19.673a2.25 2.25 0 0 1-2.244 2.077H8.084a2.25 2.25 0 0 1-2.244-2.077L4.772 5.79m14.456 0a48.108 48.108 0 0 0-3.478-.397m-12 .562c.34-.059.68-.114 1.022-.165m0 0a48.11 48.11 0 0 1 3.478-.397m7.5 0v-.916c0-1.18-.91-2.164-2.09-2.201a51.964 51.964 0 0 0-3.32 0c-1.18.037-2.09 1.022-2.09 2.201v.916m7.5 0a48.667 48.667 0 0 0-7.5 0"
                                              stroke-linecap="round" stroke-linejoin="round"/>
                                    </svg>
                                </button>
                            </form>
                        </div>
                    </div>
                </div>

                <!-- Pagination -->
                <div class="flex flex-col sm:flex-row items-center justify-between gap-4 mt-6 pt-6"
                     style="border-top: 1px solid var(--c-border)"
                     th:if="${pastesPage.totalElements > 0}">
                    <div class="flex items-center gap-2" th:if="${pastesPage.totalPages > 1}">
                        <a class="pagination-btn"
                           th:classappend="${pastesPage.first} ? ' pagination-btn-disabled'"
                           th:href="@{/admin/pastes(page=${pastesPage.first ? pastesPage.number : pastesPage.number - 1}, size=${pageSize}, query=${query})}"
                           th:text="#{pagination.previous}">Previous</a>
                        <a class="pagination-btn"
                           th:classappend="${pastesPage.last} ? ' pagination-btn-disabled'"
                           th:href="@{/admin/pastes(page=${pastesPage.last ? pastesPage.number : pastesPage.number + 1}, size=${pageSize}, query=${query})}"
                           th:text="#{pagination.next}">Next</a>
                    </div>
                    <p class="text-sm font-mono" style="color: var(--c-text-muted)">
                        <span th:text="#{pagination.page}">Page</span>
                        <span th:text="${pastesPage.number + 1}"></span>
                        <span th:text="#{pagination.of}">of</span>
                        <span th:text="${pastesPage.totalPages}"></span>
                    </p>
                    <form action="/admin/pastes" class="flex items-center gap-2" data-perpage-form method="get">
                        <input name="query" th:value="${query}" type="hidden"/>
                        <input name="page" type="hidden" value="0"/>
                        <label class="text-sm" for="pastePageSize" style="color: var(--c-text-muted)"
                               th:text="#{pagination.perPage}">Per page</label>
                        <select class="form-input" id="pastePageSize" name="size"
                                style="width: auto; padding: 0.3125rem 0.5rem">
                            <option th:selected="${pageSize == 10}" value="10">10</option>
                            <option th:selected="${pageSize == 20}" value="20">20</option>
                            <option th:selected="${pageSize == 50}" value="50">50</option>
                            <option th:selected="${pageSize == 100}" value="100">100</option>
                        </select>
                    </form>
                </div>

            </div><!-- /pasteDynamicContent -->
        </div>
    </div>
</main>

<script th:inline="javascript">
    /*<![CDATA[*/
    window.i18n = window.i18n || {};
    window.i18n.pastes = {deleteConfirm: /*[[#{page.adminPastes.deleteConfirm}]]*/ 'Are you sure you want to delete this paste? This action cannot be undone.'};
    /*]]>*/
</script>
<script src="/js/spa.js"></script>
<script src="/js/admin-pastes.js"></script>
<script src="/js/locale-switcher.js"></script>
</body>
</html>
