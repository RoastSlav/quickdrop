<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/>
  <title th:text="#{page.dashboard.title.browser(${appName})}">Dashboard — QuickDrop</title>
  <meta content="width=device-width, initial-scale=1" name="viewport"/>
  <link href="https://fonts.googleapis.com" rel="preconnect"/>
  <link crossorigin href="https://fonts.gstatic.com" rel="preconnect"/>
  <link href="/css/tailwind.css" rel="stylesheet"/>
  <link href="/css/custom.css" rel="stylesheet"/>
  <link href="/images/favicon.png" rel="icon" th:href="${appLogoPath}" type="image/png"/>
  <script src="/js/tailwindTheme.js"></script>
  <script src="/js/toast.js"></script>
  <script src="/js/counter.js"></script>
  <th:block th:replace="~{fragments/header :: scripts}"></th:block>
</head>
<body>

<div th:replace="~{fragments/header :: header(false)}"></div>

<!-- Floating orbs -->
<div aria-hidden="true" class="orb-field">
  <div class="orb orb--primary"></div>
  <div class="orb orb--secondary"></div>
  <div class="orb orb--teal"></div>
</div>

<main class="flex-1 hero-scene">
  <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8 lg:py-12">

    <!-- ── Hero header ───────────────────────────────────────────── -->
    <div class="flex flex-wrap items-center justify-between gap-4 mb-10 animate-in">
      <h1 class="page-title-xl">
        <span class="gradient-text" th:text="#{page.dashboard.title}">Admin</span>
      </h1>
      <a class="btn btn-ghost" href="/admin/settings">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24">
          <path d="M9.594 3.94c.09-.542.56-.94 1.11-.94h2.593c.55 0 1.02.398 1.11.94l.213 1.281c.063.374.313.686.645.87.074.04.147.083.22.127.325.196.72.257 1.075.124l1.217-.456a1.125 1.125 0 0 1 1.37.49l1.296 2.247a1.125 1.125 0 0 1-.26 1.431l-1.003.827c-.293.241-.438.613-.43.992a7.723 7.723 0 0 1 0 .255c-.008.378.137.75.43.991l1.004.828c.424.35.534.954.26 1.43l-1.298 2.247a1.125 1.125 0 0 1-1.369.491l-1.217-.456c-.355-.133-.75-.072-1.076.124a6.47 6.47 0 0 1-.22.128c-.331.183-.581.495-.644.869l-.213 1.281c-.09.543-.56.94-1.11.94h-2.594c-.55 0-1.019-.398-1.11-.94l-.213-1.281c-.062-.374-.312-.686-.644-.87a6.52 6.52 0 0 1-.22-.127c-.325-.196-.72-.257-1.076-.124l-1.217.456a1.125 1.125 0 0 1-1.369-.49l-1.297-2.247a1.125 1.125 0 0 1 .26-1.431l1.004-.827c.292-.241.437-.613.43-.992a6.932 6.932 0 0 1 0-.255c.007-.378-.138-.75-.43-.991l-1.004-.828a1.125 1.125 0 0 1-.26-1.43l1.297-2.247a1.125 1.125 0 0 1 1.37-.491l1.216.456c.356.133.751.072 1.076-.124.072-.044.146-.087.22-.128.332-.183.582-.495.644-.869l.214-1.28Z" stroke-linecap="round"
                stroke-linejoin="round"/>
          <path d="M15 12a3 3 0 1 1-6 0 3 3 0 0 1 6 0Z" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        <span th:text="#{nav.settings}">Settings</span>
      </a>
    </div>

    <!-- ── Oversized stats ───────────────────────────────────────── -->
    <div class="grid grid-cols-1 sm:grid-cols-3 gap-4 lg:gap-6 mb-10">
      <div class="stat-hero stat-hero--primary animate-in animate-in-delay-1">
        <span class="stat-hero-label" th:text="#{page.dashboard.totalDownloads}">Total Downloads</span>
        <span class="stat-hero-value" th:attr="data-counter-target=${analytics.totalDownloads}"
              th:text="${analytics.totalDownloads}">0</span>
        <span class="stat-hero-sub" th:text="#{page.dashboard.excludingDeleted}">Excluding deleted files</span>
      </div>
      <div class="stat-hero stat-hero--secondary animate-in animate-in-delay-2">
        <span class="stat-hero-label" th:text="#{page.dashboard.totalSpaceUsed}">Total Space Used</span>
        <span class="stat-hero-value" th:text="${analytics.totalSpaceUsed}">0 MB</span>
        <span class="stat-hero-sub">on disk</span>
      </div>
      <div class="stat-hero stat-hero--teal animate-in animate-in-delay-3">
        <span class="stat-hero-label" th:text="#{page.dashboard.averageFileSize}">Average File Size</span>
        <span class="stat-hero-value" th:text="${analytics.averageFileSize}">0 MB</span>
        <span class="stat-hero-sub">per file</span>
      </div>
    </div>

    <!-- ── Files section ─────────────────────────────────────────── -->
    <div class="card card-xl animate-in animate-in-delay-4" id="fileSectionWrapper">

      <!-- Static: section header + search -->
      <div class="flex flex-col gap-5 mb-6">
        <div class="flex flex-wrap items-center justify-between gap-4">
          <h2 class="section-title flex items-center gap-2">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="1.8" style="color:var(--c-primary)"
                 viewBox="0 0 24 24">
              <path d="M19.5 14.25v-2.625a3.375 3.375 0 0 0-3.375-3.375h-1.5A1.125 1.125 0 0 1 13.5 7.125v-1.5a3.375 3.375 0 0 0-3.375-3.375H8.25m2.25 0H5.625c-.621 0-1.125.504-1.125 1.125v17.25c0 .621.504 1.125 1.125 1.125h12.75c.621 0 1.125-.504 1.125-1.125V11.25a9 9 0 0 0-9-9Z" stroke-linecap="round"
                    stroke-linejoin="round"/>
            </svg>
            <span th:text="#{page.dashboard.files}">Files</span>
          </h2>
          <span class="badge badge-primary font-mono text-sm" id="fileTotalBadge"
                th:text="${filesPage.totalElements} + ' ' + #{page.dashboard.total}">0 total</span>
        </div>

        <!-- Search (static — stays when dynamic content refreshes) -->
        <form action="/admin/dashboard" class="flex flex-col sm:flex-row gap-3" id="adminSearchForm"
              method="get">
          <input name="page" type="hidden" value="0"/>
          <input name="size" th:value="${pageSize}" type="hidden"/>
          <div class="search-bar flex-1">
            <span class="search-bar-icon">
              <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path
                      d="m21 21-5.197-5.197m0 0A7.5 7.5 0 1 0 5.196 5.196a7.5 7.5 0 0 0 10.607 10.607Z" stroke-linecap="round"
                      stroke-linejoin="round"/></svg>
            </span>
            <label class="sr-only" for="adminSearch" th:text="#{page.dashboard.search.label}">Search files</label>
            <input autocomplete="off" id="adminSearch" name="query"
                   placeholder="Search by name, description, or UUID…"
                   th:placeholder="#{page.dashboard.search.placeholder}"
                   th:value="${query}" type="text"/>
            <span class="kbd hidden sm:inline">/</span>
          </div>
          <button class="btn btn-primary" type="submit">
            <span th:text="#{button.search}">Search</span>
          </button>
        </form>
      </div>

      <!-- ── Dynamic content (replaced on search / paginate) ──────── -->
      <div id="fileDynamicContent">

        <!-- Empty state -->
        <div class="text-center py-16" th:if="${filesPage.totalElements == 0}">
          <div class="gate-icon gate-icon--primary mx-auto mb-6">
            <svg class="w-10 h-10" fill="none" stroke="currentColor" stroke-width="1.4" viewBox="0 0 24 24">
              <path d="M3.75 9.776c.112-.017.227-.026.344-.026h15.812c.117 0 .232.009.344.026M3.75 9.776a2.25 2.25 0 0 0-1.883 2.542l.857 6a2.25 2.25 0 0 0 2.227 1.932H19.05a2.25 2.25 0 0 0 2.227-1.932l.857-6a2.25 2.25 0 0 0-1.883-2.542M3.75 9.776V6A2.25 2.25 0 0 1 6 3.75h3.879a1.5 1.5 0 0 1 1.06.44l2.122 2.12a1.5 1.5 0 0 0 1.06.44H18A2.25 2.25 0 0 1 20.25 9v.776" stroke-linecap="round"
                    stroke-linejoin="round"/>
            </svg>
          </div>
          <p class="text-lg font-semibold" style="color: var(--c-text-muted)" th:text="#{page.dashboard.noFilesFound}">
            No files found.</p>
        </div>

        <!-- File cards -->
        <div class="flex flex-col gap-2.5" th:if="${filesPage.totalElements > 0}">
          <div class="group flex flex-col sm:flex-row sm:items-center gap-3 sm:gap-4 px-4 py-3.5 rounded-2xl transition-all duration-200 hover:shadow-md"
               style="animation: qd-fade-in-up 350ms var(--ease-out-expo) both"
               th:attr="data-uuid=${file.uuid}, data-keep=${file.keepIndefinitely}, data-is-hidden=${file.hidden}"
               th:each="file, iterStat : ${filesPage.content}"
               th:style="'animation-delay:' + ${iterStat.index * 35} + 'ms; background: var(--c-surface-raised); border: 1px solid var(--c-border); border-left: 4px solid ' + (${file.keepIndefinitely and file.hidden} ? 'var(--c-rose)' : (${file.keepIndefinitely} ? 'var(--c-teal)' : (${file.hidden} ? 'var(--c-rose)' : 'var(--c-primary)')))">

            <!-- ① File icon + name + meta -->
            <div class="flex items-center gap-3 min-w-0 flex-1">
              <div class="w-9 h-9 rounded-xl flex items-center justify-center flex-shrink-0"
                   data-file-icon
                   th:style="${file.keepIndefinitely and file.hidden} ? 'background:var(--c-rose-muted);color:var(--c-rose)' : (${file.keepIndefinitely} ? 'background:var(--c-teal-muted);color:var(--c-teal)' : (${file.hidden} ? 'background:var(--c-rose-muted);color:var(--c-rose)' : 'background:var(--c-primary-muted);color:var(--c-primary)'))">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="1.6" viewBox="0 0 24 24">
                  <path d="M19.5 14.25v-2.625a3.375 3.375 0 0 0-3.375-3.375h-1.5A1.125 1.125 0 0 1 13.5 7.125v-1.5a3.375 3.375 0 0 0-3.375-3.375H8.25m2.25 0H5.625c-.621 0-1.125.504-1.125 1.125v17.25c0 .621.504 1.125 1.125 1.125h12.75c.621 0 1.125-.504 1.125-1.125V11.25a9 9 0 0 0-9-9Z" stroke-linecap="round"
                        stroke-linejoin="round"/>
                </svg>
              </div>
              <div class="min-w-0 flex-1">
                <p class="font-bold text-sm truncate" th:text="${file.name}" th:title="${file.name}">filename.zip</p>
                <p class="text-xs font-mono mt-0.5" style="color: var(--c-text-faint)">
                  <span th:text="${#temporals.format(file.uploadDate, 'dd.MM.yyyy')}">01.01.2025</span>
                  <span class="opacity-40 mx-0.5">·</span>
                  <span th:text="${file.size}">—</span>
                  <span class="opacity-40 mx-0.5">·</span>
                  <span th:text="${file.totalDownloads}">0</span>
                  <svg class="w-3 h-3 inline-block mb-0.5 ml-0.5 opacity-50" fill="none" stroke="currentColor"
                       stroke-width="2.5" viewBox="0 0 24 24">
                    <path d="M3 16.5v2.25A2.25 2.25 0 0 0 5.25 21h13.5A2.25 2.25 0 0 0 21 18.75V16.5m-6-6-3 3m0 0-3-3m3 3V3" stroke-linecap="round"
                          stroke-linejoin="round"/>
                  </svg>
                </p>
              </div>
            </div>

            <!-- ② Toggles -->
            <div class="flex items-center gap-5 flex-shrink-0 pl-12 sm:pl-0">
              <form method="post" th:action="@{/admin/keep-indefinitely/{uuid}(uuid=${file.uuid})}">
                <input th:name="${_csrf.parameterName}" th:value="${_csrf.token}" type="hidden"/>
                <input name="keepIndefinitely" type="hidden" value="false"/>
                <div class="flex flex-col items-center gap-0.5">
                  <span class="text-[0.6rem] font-black uppercase tracking-widest" style="color:var(--c-teal)"
                        th:text="#{page.dashboard.keepShort}">Keep</span>
                  <label class="toggle toggle--teal">
                    <input name="keepIndefinitely" th:checked="${file.keepIndefinitely}" type="checkbox" value="true"/>
                    <span class="toggle-slider"></span>
                  </label>
                </div>
              </form>

              <form method="post" th:action="@{/admin/toggle-hidden/{uuid}(uuid=${file.uuid})}">
                <input th:name="${_csrf.parameterName}" th:value="${_csrf.token}" type="hidden"/>
                <input name="hidden" type="hidden" value="false"/>
                <div class="flex flex-col items-center gap-0.5">
                  <span class="text-[0.6rem] font-black uppercase tracking-widest" style="color:var(--c-rose)"
                        th:text="#{page.dashboard.hideShort}">Hide</span>
                  <label class="toggle toggle--rose">
                    <input name="hidden" th:checked="${file.hidden}" type="checkbox" value="true"/>
                    <span class="toggle-slider"></span>
                  </label>
                </div>
              </form>
            </div>

            <!-- ③ Actions -->
            <div class="flex items-center gap-1.5 flex-shrink-0 pl-12 sm:pl-0">
              <a class="btn btn-soft-primary btn-sm"
                 th:href="@{/file/{uuid}(uuid=${file.uuid})}" th:title="#{button.view}">
                <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                  <path d="M2.036 12.322a1.012 1.012 0 0 1 0-.639C3.423 7.51 7.36 4.5 12 4.5c4.638 0 8.573 3.007 9.963 7.178.07.207.07.431 0 .639C20.577 16.49 16.64 19.5 12 19.5c-4.638 0-8.573-3.007-9.963-7.178Z" stroke-linecap="round"
                        stroke-linejoin="round"/>
                  <path d="M15 12a3 3 0 1 1-6 0 3 3 0 0 1 6 0Z" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
                <span th:text="#{button.view}">View</span>
              </a>
              <a class="btn btn-ghost btn-sm"
                 th:href="@{/file/history/{uuid}(uuid=${file.uuid})}" th:title="#{button.history}">
                <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                  <path d="M12 6v6h4.5m4.5 0a9 9 0 1 1-18 0 9 9 0 0 1 18 0Z" stroke-linecap="round"
                        stroke-linejoin="round"/>
                </svg>
                <span th:text="#{button.history}">History</span>
              </a>
              <a class="btn btn-ghost btn-sm"
                 th:href="@{/file/download/{uuid}(uuid=${file.uuid})}" th:title="#{button.download}">
                <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                  <path d="M3 16.5v2.25A2.25 2.25 0 0 0 5.25 21h13.5A2.25 2.25 0 0 0 21 18.75V16.5m-6-6-3 3m0 0-3-3m3 3V3" stroke-linecap="round"
                        stroke-linejoin="round"/>
                </svg>
              </a>
              <form data-delete-form method="post"
                    style="display:contents" th:action="@{/admin/delete/{uuid}(uuid=${file.uuid})}">
                <input th:name="${_csrf.parameterName}" th:value="${_csrf.token}" type="hidden"/>
                <button class="btn btn-danger btn-sm" th:title="#{button.delete}" type="submit">
                  <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                    <path d="m14.74 9-.346 9m-4.788 0L9.26 9m9.968-3.21c.342.052.682.107 1.022.166m-1.022-.165L18.16 19.673a2.25 2.25 0 0 1-2.244 2.077H8.084a2.25 2.25 0 0 1-2.244-2.077L4.772 5.79m14.456 0a48.108 48.108 0 0 0-3.478-.397m-12 .562c.34-.059.68-.114 1.022-.165m0 0a48.11 48.11 0 0 1 3.478-.397m7.5 0v-.916c0-1.18-.91-2.164-2.09-2.201a51.964 51.964 0 0 0-3.32 0c-1.18.037-2.09 1.022-2.09 2.201v.916m7.5 0a48.667 48.667 0 0 0-7.5 0" stroke-linecap="round"
                          stroke-linejoin="round"/>
                  </svg>
                </button>
              </form>
            </div>
          </div>
        </div>

        <!-- Pagination -->
        <div class="flex flex-col sm:flex-row items-center justify-between gap-4 mt-6 pt-6"
             style="border-top: 1px solid var(--c-border)"
             th:if="${filesPage.totalElements > 0}">
          <div class="flex items-center gap-2" th:if="${filesPage.totalPages > 1}">
            <a class="pagination-btn"
               th:classappend="${filesPage.first} ? ' pagination-btn-disabled'"
               th:href="@{/admin/dashboard(page=${filesPage.first ? filesPage.number : filesPage.number - 1}, size=${pageSize}, query=${query})}"
               th:text="#{pagination.previous}">Previous</a>
            <a class="pagination-btn"
               th:classappend="${filesPage.last} ? ' pagination-btn-disabled'"
               th:href="@{/admin/dashboard(page=${filesPage.last ? filesPage.number : filesPage.number + 1}, size=${pageSize}, query=${query})}"
               th:text="#{pagination.next}">Next</a>
          </div>

          <p class="text-sm font-mono" style="color: var(--c-text-muted)">
            <span th:text="#{pagination.page}">Page</span>
            <span th:text="${filesPage.number + 1}"></span>
            <span th:text="#{pagination.of}">of</span>
            <span th:text="${filesPage.totalPages}"></span>
          </p>

          <form action="/admin/dashboard" class="flex items-center gap-2" data-perpage-form method="get">
            <input name="query" th:value="${query}" type="hidden"/>
            <input name="page" type="hidden" value="0"/>
            <label class="text-sm" for="adminPageSize" style="color: var(--c-text-muted)"
                   th:text="#{pagination.perPage}">Per page</label>
            <select class="form-input" id="adminPageSize"
                    name="size" style="width: auto; padding: 0.3125rem 0.5rem">
              <option th:selected="${pageSize == 10}" value="10">10</option>
              <option th:selected="${pageSize == 20}" value="20">20</option>
              <option th:selected="${pageSize == 50}" value="50">50</option>
              <option th:selected="${pageSize == 100}" value="100">100</option>
            </select>
          </form>
        </div>

      </div><!-- /fileDynamicContent -->
    </div>
  </div>
</main>

<script th:inline="javascript">
  /*<![CDATA[*/
  window.i18n = window.i18n || {};
  window.i18n.dashboard = {deleteConfirm: /*[[#{page.dashboard.deleteConfirm}]]*/ 'Are you sure you want to delete this file? This action cannot be undone.'};
  /*]]>*/
</script>
<script src="/js/spa.js"></script>
<script src="/js/admin-dashboard.js"></script>
<script src="/js/locale-switcher.js"></script>
</body>
</html>
