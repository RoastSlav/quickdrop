<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title th:text="#{page.error.title.browser(${appName})}">Error — QuickDrop</title>
    <meta content="width=device-width, initial-scale=1" name="viewport"/>
    <link href="https://fonts.googleapis.com" rel="preconnect"/>
    <link crossorigin href="https://fonts.gstatic.com" rel="preconnect"/>
    <link href="/css/tailwind.css" rel="stylesheet"/>
    <link href="/css/custom.css" rel="stylesheet"/>
    <link href="/images/favicon.png" rel="icon" th:href="${appLogoPath}" type="image/png"/>
    <script src="/js/tailwindTheme.js"></script>
    <th:block th:replace="~{fragments/header :: scripts}"></th:block>
</head>
<body>

<div th:replace="~{fragments/header :: header(false)}"></div>

<!-- Floating orbs (rose-tinted for error) -->
<div aria-hidden="true" class="orb-field">
    <div class="orb" style="background:var(--c-rose-muted);width:32rem;height:32rem;top:-8rem;left:-8rem"></div>
    <div class="orb orb--secondary" style="width:20rem;height:20rem;bottom:-4rem;right:-4rem"></div>
</div>

<main class="gate-page hero-scene" style="min-height: calc(100vh - var(--nav-h, 4rem))">

    <div class="w-full max-w-sm text-center animate-in">

        <!-- Error icon -->
        <div class="gate-icon mx-auto mb-6"
             style="background:color-mix(in srgb,var(--c-danger) 15%,transparent);color:var(--c-danger);width:5rem;height:5rem">
            <svg class="w-10 h-10" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
                <path d="M12 9v3.75m-9.303 3.376c-.866 1.5.217 3.374 1.948 3.374h14.71c1.73 0 2.813-1.874 1.948-3.374L13.949 3.378c-.866-1.5-3.032-1.5-3.898 0L2.697 16.126ZM12 15.75h.007v.008H12v-.008Z" stroke-linecap="round"
                      stroke-linejoin="round"/>
            </svg>
        </div>

        <h1 class="text-4xl font-extrabold tracking-tight mb-3" th:text="#{page.error.title}">Oops!</h1>
        <p class="page-subtitle mb-8" th:text="#{page.error.message}">Something went wrong. Please try again later.</p>

        <a class="btn btn-gradient btn-lg" href="/">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                <path d="m2.25 12 8.954-8.955c.44-.439 1.152-.439 1.591 0L21.75 12M4.5 9.75v10.125c0 .621.504 1.125 1.125 1.125H9.75v-4.875c0-.621.504-1.125 1.125-1.125h2.25c.621 0 1.125.504 1.125 1.125V21h4.125c.621 0 1.125-.504 1.125-1.125V9.75M8.25 21h8.25" stroke-linecap="round"
                      stroke-linejoin="round"/>
            </svg>
            <span th:text="#{page.error.goHome}">Go Back to Main Page</span>
        </a>
    </div>

</main>

<script src="/js/locale-switcher.js"></script>
</body>
</html>
